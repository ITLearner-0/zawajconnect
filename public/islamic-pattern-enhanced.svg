
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="pattern-base" patternUnits="userSpaceOnUse" width="50" height="50" patternTransform="scale(0.5) rotate(0)">
      <path d="M0,25 L25,0 L50,25 L25,50 Z" fill="currentColor" fill-opacity="0.2"/>
      <path d="M25,0 A25,25 0 0,1 50,25 A25,25 0 0,1 25,50 A25,25 0 0,1 0,25 A25,25 0 0,1 25,0 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3"/>
      <circle cx="25" cy="25" r="5" fill="currentColor" fill-opacity="0.4"/>
    </pattern>
    
    <pattern id="pattern-overlay" patternUnits="userSpaceOnUse" width="100" height="100" patternTransform="scale(0.5) rotate(45)">
      <path d="M0,0 L100,0 L100,100 L0,100 Z" fill="url(#pattern-base)"/>
      <path d="M50,0 L100,50 L50,100 L0,50 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-opacity="0.15"/>
      <path d="M0,0 L100,100 M100,0 L0,100" stroke="currentColor" stroke-width="1" stroke-opacity="0.1"/>
    </pattern>
  </defs>
  
  <rect width="100" height="100" fill="url(#pattern-overlay)"/>
  
  <!-- Arabesque floral elements -->
  <g fill="currentColor" fill-opacity="0.25">
    <path d="M50,20 C60,5 80,15 70,30 C90,25 85,50 65,45 C85,60 70,80 50,65 C30,80 15,60 35,45 C15,50 10,25 30,30 C20,15 40,5 50,20 Z"/>
  </g>
  
  <!-- Geometric overlay -->
  <g stroke="currentColor" stroke-opacity="0.2" fill="none" stroke-width="1">
    <path d="M25,15 L75,15 L75,85 L25,85 Z"/>
    <path d="M15,25 L85,25 L85,75 L15,75 Z"/>
    <circle cx="50" cy="50" r="30"/>
    <circle cx="50" cy="50" r="15"/>
  </g>
</svg>
