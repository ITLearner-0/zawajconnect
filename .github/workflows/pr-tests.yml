name: 🧪 PR Tests & Coverage

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-and-coverage:
    name: Run Tests & Report Coverage
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: 📦 Install dependencies
        run: npm ci
        
      - name: 🧪 Run tests with coverage on PR branch
        run: npm run test:coverage
        continue-on-error: true
        id: tests
        env:
          CI: true
          
      - name: 💾 Save PR coverage
        run: |
          mkdir -p ./pr-coverage
          cp coverage/coverage-summary.json ./pr-coverage/coverage-summary.json
          
      - name: 📊 Extract PR coverage summary
        id: coverage
        run: |
          COVERAGE_SUMMARY=$(cat coverage/coverage-summary.json)
          LINES=$(echo $COVERAGE_SUMMARY | jq -r '.total.lines.pct')
          STATEMENTS=$(echo $COVERAGE_SUMMARY | jq -r '.total.statements.pct')
          FUNCTIONS=$(echo $COVERAGE_SUMMARY | jq -r '.total.functions.pct')
          BRANCHES=$(echo $COVERAGE_SUMMARY | jq -r '.total.branches.pct')
          
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          
      - name: 📥 Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          
      - name: 🧪 Run tests with coverage on main branch
        run: npm ci && npm run test:coverage
        continue-on-error: true
        env:
          CI: true
          
      - name: 📊 Extract main coverage summary
        id: coverage_main
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE_SUMMARY=$(cat coverage/coverage-summary.json)
            LINES=$(echo $COVERAGE_SUMMARY | jq -r '.total.lines.pct')
            STATEMENTS=$(echo $COVERAGE_SUMMARY | jq -r '.total.statements.pct')
            FUNCTIONS=$(echo $COVERAGE_SUMMARY | jq -r '.total.functions.pct')
            BRANCHES=$(echo $COVERAGE_SUMMARY | jq -r '.total.branches.pct')
            
            echo "lines=$LINES" >> $GITHUB_OUTPUT
            echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          else
            echo "lines=0" >> $GITHUB_OUTPUT
            echo "statements=0" >> $GITHUB_OUTPUT
            echo "functions=0" >> $GITHUB_OUTPUT
            echo "branches=0" >> $GITHUB_OUTPUT
          fi
          
      - name: 🔢 Calculate coverage diff
        id: diff
        run: |
          PR_LINES=${{ steps.coverage.outputs.lines }}
          PR_STATEMENTS=${{ steps.coverage.outputs.statements }}
          PR_FUNCTIONS=${{ steps.coverage.outputs.functions }}
          PR_BRANCHES=${{ steps.coverage.outputs.branches }}
          
          MAIN_LINES=${{ steps.coverage_main.outputs.lines }}
          MAIN_STATEMENTS=${{ steps.coverage_main.outputs.statements }}
          MAIN_FUNCTIONS=${{ steps.coverage_main.outputs.functions }}
          MAIN_BRANCHES=${{ steps.coverage_main.outputs.branches }}
          
          DIFF_LINES=$(echo "$PR_LINES - $MAIN_LINES" | bc)
          DIFF_STATEMENTS=$(echo "$PR_STATEMENTS - $MAIN_STATEMENTS" | bc)
          DIFF_FUNCTIONS=$(echo "$PR_FUNCTIONS - $MAIN_FUNCTIONS" | bc)
          DIFF_BRANCHES=$(echo "$PR_BRANCHES - $MAIN_BRANCHES" | bc)
          
          echo "lines=$DIFF_LINES" >> $GITHUB_OUTPUT
          echo "statements=$DIFF_STATEMENTS" >> $GITHUB_OUTPUT
          echo "functions=$DIFF_FUNCTIONS" >> $GITHUB_OUTPUT
          echo "branches=$DIFF_BRANCHES" >> $GITHUB_OUTPUT
          
      - name: 💬 Comment PR with coverage comparison
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prLines = parseFloat('${{ steps.coverage.outputs.lines }}');
            const prStatements = parseFloat('${{ steps.coverage.outputs.statements }}');
            const prFunctions = parseFloat('${{ steps.coverage.outputs.functions }}');
            const prBranches = parseFloat('${{ steps.coverage.outputs.branches }}');
            
            const mainLines = parseFloat('${{ steps.coverage_main.outputs.lines }}');
            const mainStatements = parseFloat('${{ steps.coverage_main.outputs.statements }}');
            const mainFunctions = parseFloat('${{ steps.coverage_main.outputs.functions }}');
            const mainBranches = parseFloat('${{ steps.coverage_main.outputs.branches }}');
            
            const diffLines = parseFloat('${{ steps.diff.outputs.lines }}');
            const diffStatements = parseFloat('${{ steps.diff.outputs.statements }}');
            const diffFunctions = parseFloat('${{ steps.diff.outputs.functions }}');
            const diffBranches = parseFloat('${{ steps.diff.outputs.branches }}');
            
            const testsPassed = '${{ steps.tests.outcome }}' === 'success';
            const coverageThreshold = 80;
            
            const meetsThreshold = (value) => value >= coverageThreshold;
            const allMeetThreshold = meetsThreshold(prLines) && meetsThreshold(prStatements) && 
                                     meetsThreshold(prFunctions) && meetsThreshold(prBranches);
            
            const getEmoji = (value) => meetsThreshold(value) ? '✅' : '❌';
            const getDiffEmoji = (diff) => {
              if (Math.abs(diff) < 0.01) return '➡️';
              return diff > 0 ? '📈' : '📉';
            };
            const formatDiff = (diff) => {
              const sign = diff > 0 ? '+' : '';
              return `${sign}${diff.toFixed(2)}%`;
            };
            const getDiffColor = (diff) => {
              if (Math.abs(diff) < 0.01) return '';
              return diff > 0 ? '🟢' : '🔴';
            };
            
            const getStatus = () => {
              if (!testsPassed) return '❌ Tests Failed';
              if (!allMeetThreshold) return '⚠️ Coverage Below Threshold';
              return '✅ All Checks Passed';
            };
            
            const hasMainCoverage = mainLines > 0;
            
            const comment = `## 🧪 Test Results & Coverage Report
            
            **Status:** ${getStatus()}
            
            ### Coverage Summary
            
            ${hasMainCoverage ? `
            | Metric | PR Coverage | Main Coverage | Diff | Status | Threshold |
            |--------|-------------|---------------|------|--------|-----------|
            | Lines | ${prLines.toFixed(2)}% | ${mainLines.toFixed(2)}% | ${getDiffColor(diffLines)} ${formatDiff(diffLines)} ${getDiffEmoji(diffLines)} | ${getEmoji(prLines)} | 80% |
            | Statements | ${prStatements.toFixed(2)}% | ${mainStatements.toFixed(2)}% | ${getDiffColor(diffStatements)} ${formatDiff(diffStatements)} ${getDiffEmoji(diffStatements)} | ${getEmoji(prStatements)} | 80% |
            | Functions | ${prFunctions.toFixed(2)}% | ${mainFunctions.toFixed(2)}% | ${getDiffColor(diffFunctions)} ${formatDiff(diffFunctions)} ${getDiffEmoji(diffFunctions)} | ${getEmoji(prFunctions)} | 80% |
            | Branches | ${prBranches.toFixed(2)}% | ${mainBranches.toFixed(2)}% | ${getDiffColor(diffBranches)} ${formatDiff(diffBranches)} ${getDiffEmoji(diffBranches)} | ${getEmoji(prBranches)} | 80% |
            ` : `
            | Metric | Coverage | Status | Threshold |
            |--------|----------|--------|-----------|
            | Lines | ${prLines.toFixed(2)}% | ${getEmoji(prLines)} | 80% |
            | Statements | ${prStatements.toFixed(2)}% | ${getEmoji(prStatements)} | 80% |
            | Functions | ${prFunctions.toFixed(2)}% | ${getEmoji(prFunctions)} | 80% |
            | Branches | ${prBranches.toFixed(2)}% | ${getEmoji(prBranches)} | 80% |
            `}
            
            ${hasMainCoverage ? `
            ### 📊 Coverage Evolution
            
            ${diffLines > 0 ? '🟢 **Coverage improved!**' : diffLines < 0 ? '🔴 **Coverage decreased!**' : '➡️ **Coverage unchanged**'}
            
            - Lines: ${formatDiff(diffLines)} ${getDiffEmoji(diffLines)}
            - Statements: ${formatDiff(diffStatements)} ${getDiffEmoji(diffStatements)}
            - Functions: ${formatDiff(diffFunctions)} ${getDiffEmoji(diffFunctions)}
            - Branches: ${formatDiff(diffBranches)} ${getDiffEmoji(diffBranches)}
            
            ` : ''}
            
            ${!testsPassed ? '⚠️ **Some tests failed.** Please check the logs above for details.\n\n' : ''}
            ${!allMeetThreshold && testsPassed ? '⚠️ **Coverage is below the 80% threshold.** Please add more tests.\n\n' : ''}
            ${testsPassed && allMeetThreshold && hasMainCoverage && diffLines >= 0 ? '🎉 **Excellent!** All tests passed, coverage meets requirements, and coverage improved or stayed stable.\n\n' : ''}
            ${testsPassed && allMeetThreshold && (!hasMainCoverage || diffLines >= -0.01) ? '✨ **Great job!** All tests passed and coverage meets the requirements.\n\n' : ''}
            
            <details>
            <summary>📈 View detailed coverage report</summary>
            
            The full HTML coverage report is available in the workflow artifacts.
            Download it from the **Artifacts** section at the bottom of this workflow run.
            
            </details>
            
            ---
            *Coverage report generated by GitHub Actions • Comparing with main branch*
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results & Coverage Report')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
            
      - name: 📈 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-report
          path: coverage/
          retention-days: 14
          
      - name: ❌ Fail if tests or coverage insufficient
        if: steps.tests.outcome != 'success'
        run: |
          echo "Tests failed or coverage is below threshold"
          exit 1
          
      - name: 📢 Notify Slack on PR test failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "⚠️ PR Tests Failed - ZawajConnect",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ PR Tests Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*PR:*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*PR Coverage:*\nLines: ${{ steps.coverage.outputs.lines }}% | Branches: ${{ steps.coverage.outputs.branches }}%"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Main Coverage:*\nLines: ${{ steps.coverage_main.outputs.lines }}% | Branches: ${{ steps.coverage_main.outputs.branches }}%"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Diff:*\nLines: ${{ steps.diff.outputs.lines }}% | Branches: ${{ steps.diff.outputs.branches }}%"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Threshold:*\n80% required"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View PR"
                      },
                      "url": "${{ github.event.pull_request.html_url }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
          
      - name: 📢 Notify Discord on PR test failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "username": "GitHub Actions",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "title": "⚠️ PR Tests Failed - ZawajConnect",
                "color": 16776960,
                "fields": [
                  {
                    "name": "Pull Request",
                    "value": "[#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})",
                    "inline": false
                  },
                  {
                    "name": "Author",
                    "value": "${{ github.event.pull_request.user.login }}",
                    "inline": true
                  },
                  {
                    "name": "Threshold",
                    "value": "80% required",
                    "inline": true
                  },
                  {
                    "name": "PR Coverage",
                    "value": "Lines: ${{ steps.coverage.outputs.lines }}% | Branches: ${{ steps.coverage.outputs.branches }}%",
                    "inline": false
                  },
                  {
                    "name": "Main Coverage",
                    "value": "Lines: ${{ steps.coverage_main.outputs.lines }}% | Branches: ${{ steps.coverage_main.outputs.branches }}%",
                    "inline": false
                  },
                  {
                    "name": "Diff",
                    "value": "Lines: ${{ steps.diff.outputs.lines }}% | Branches: ${{ steps.diff.outputs.branches }}%",
                    "inline": false
                  }
                ],
                "timestamp": "${{ github.event.pull_request.updated_at }}",
                "footer": {
                  "text": "View workflow"
                },
                "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
