name: 🧪 PR Tests & Coverage

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-and-coverage:
    name: Run Tests & Report Coverage
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: 📦 Install dependencies
        run: npm ci
        
      - name: 🧪 Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true
        id: tests
        env:
          CI: true
          
      - name: 📊 Extract coverage summary
        id: coverage
        run: |
          COVERAGE_SUMMARY=$(cat coverage/coverage-summary.json)
          LINES=$(echo $COVERAGE_SUMMARY | jq -r '.total.lines.pct')
          STATEMENTS=$(echo $COVERAGE_SUMMARY | jq -r '.total.statements.pct')
          FUNCTIONS=$(echo $COVERAGE_SUMMARY | jq -r '.total.functions.pct')
          BRANCHES=$(echo $COVERAGE_SUMMARY | jq -r '.total.branches.pct')
          
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          
      - name: 💬 Comment PR with coverage
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lines = '${{ steps.coverage.outputs.lines }}';
            const statements = '${{ steps.coverage.outputs.statements }}';
            const functions = '${{ steps.coverage.outputs.functions }}';
            const branches = '${{ steps.coverage.outputs.branches }}';
            
            const testsPassed = '${{ steps.tests.outcome }}' === 'success';
            const coverageThreshold = 80;
            
            const meetsThreshold = (value) => parseFloat(value) >= coverageThreshold;
            const allMeetThreshold = meetsThreshold(lines) && meetsThreshold(statements) && 
                                     meetsThreshold(functions) && meetsThreshold(branches);
            
            const getEmoji = (value) => meetsThreshold(value) ? '✅' : '❌';
            const getStatus = () => {
              if (!testsPassed) return '❌ Tests Failed';
              if (!allMeetThreshold) return '⚠️ Coverage Below Threshold';
              return '✅ All Checks Passed';
            };
            
            const comment = `## 🧪 Test Results & Coverage Report
            
            **Status:** ${getStatus()}
            
            ### Coverage Summary
            
            | Metric | Coverage | Status | Threshold |
            |--------|----------|--------|-----------|
            | Lines | ${lines}% | ${getEmoji(lines)} | 80% |
            | Statements | ${statements}% | ${getEmoji(statements)} | 80% |
            | Functions | ${functions}% | ${getEmoji(functions)} | 80% |
            | Branches | ${branches}% | ${getEmoji(branches)} | 80% |
            
            ${!testsPassed ? '⚠️ **Some tests failed.** Please check the logs above for details.\n\n' : ''}
            ${!allMeetThreshold && testsPassed ? '⚠️ **Coverage is below the 80% threshold.** Please add more tests.\n\n' : ''}
            ${testsPassed && allMeetThreshold ? '🎉 **Great job!** All tests passed and coverage meets the requirements.\n\n' : ''}
            
            <details>
            <summary>📈 View detailed coverage report</summary>
            
            The full HTML coverage report is available in the workflow artifacts.
            Download it from the **Artifacts** section at the bottom of this workflow run.
            
            </details>
            
            ---
            *Coverage report generated by GitHub Actions*
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results & Coverage Report')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
            
      - name: 📈 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-report
          path: coverage/
          retention-days: 14
          
      - name: ❌ Fail if tests or coverage insufficient
        if: steps.tests.outcome != 'success'
        run: |
          echo "Tests failed or coverage is below threshold"
          exit 1
          
      - name: 📢 Notify Slack on PR test failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "⚠️ PR Tests Failed - ZawajConnect",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ PR Tests Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*PR:*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Coverage:*\nLines: ${{ steps.coverage.outputs.lines }}% | Branches: ${{ steps.coverage.outputs.branches }}%"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Threshold:*\n80% required"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View PR"
                      },
                      "url": "${{ github.event.pull_request.html_url }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
          
      - name: 📢 Notify Discord on PR test failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "username": "GitHub Actions",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "title": "⚠️ PR Tests Failed - ZawajConnect",
                "color": 16776960,
                "fields": [
                  {
                    "name": "Pull Request",
                    "value": "[#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})",
                    "inline": false
                  },
                  {
                    "name": "Author",
                    "value": "${{ github.event.pull_request.user.login }}",
                    "inline": true
                  },
                  {
                    "name": "Threshold",
                    "value": "80% required",
                    "inline": true
                  },
                  {
                    "name": "Coverage",
                    "value": "Lines: ${{ steps.coverage.outputs.lines }}% | Branches: ${{ steps.coverage.outputs.branches }}%",
                    "inline": false
                  }
                ],
                "timestamp": "${{ github.event.pull_request.updated_at }}",
                "footer": {
                  "text": "View workflow"
                },
                "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
